services:
  caddy:
    image: caddy:2.10.0
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./conf:/etc/caddy
      - ${APPDIR_PUZLINGHOME:-/srv/puzlinghome}:/srv/puzlinghome
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
