services:
  caddy:
    image: caddy:2.10.0
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./conf:/etc/caddy
      - ${APPDIR_PUZLINGHOME:-/srv/puzlinghome}:/srv/puzlinghome
      - ${APPDIR_DEVDOCTRINE:-/srv/devdoctrine}:/srv/devdoctrine
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
